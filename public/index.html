<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>

    <!-- SEO: basic meta tags for discoverability -->
    <meta name="description" content="Tap Tycoon — Build your idle empire, one tap at a time. Free to play browser game." />
    <meta name="theme-color" content="#0a0a1a" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:title" content="Tap Tycoon" />
    <meta property="og:description" content="Build your idle empire, one tap at a time. Free to play browser game." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tap Tycoon" />
    <meta name="twitter:description" content="Build your idle empire, one tap at a time." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Google AdSense site verification -->
    <meta name="google-adsense-account" content="ca-pub-7610075308812167">

    <!-- AdSense script is loaded dynamically in production only (see src/services/ads.ts).
         This avoids ERR_BLOCKED_BY_CLIENT in development when using an ad blocker. -->

    <!-- The `react-native-web` recommended style reset -->
    <style id="expo-reset">
      html, body {
        height: 100%;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
